<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUZEF İSG - Soru Bankası</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 600px; width: 100%; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); }
        h1 { color: #1a73e8; text-align: center; font-size: 22px; margin-bottom: 20px; }
        
        .selection-area { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; padding: 15px; background: #f8f9fa; border-radius: 10px; }
        select { padding: 10px; border-radius: 8px; border: 1px solid #dadce0; font-size: 14px; outline: none; }
        
        .stats { display: flex; justify-content: space-around; margin-bottom: 20px; font-weight: bold; }
        .stat-box { padding: 10px 20px; border-radius: 8px; font-size: 13px; }
        .correct-box { background: #e6f4ea; color: #1e8e3e; }
        .wrong-box { background: #fce8e6; color: #d93025; }
        
        .question-text { font-size: 18px; margin-bottom: 20px; line-height: 1.6; color: #202124; font-weight: 500; display: none; }
        .options { display: flex; flex-direction: column; gap: 12px; }
        .option-btn { padding: 15px; border: 2px solid #dadce0; border-radius: 10px; background: white; cursor: pointer; transition: all 0.2s; text-align: left; font-size: 16px; color: #3c4043; }
        .option-btn:hover:not(:disabled) { border-color: #1a73e8; background-color: #f8f9fa; }
        .correct { background-color: #34a853 !important; color: white !important; border-color: #188038 !important; }
        .wrong { background-color: #ea4335 !important; color: white !important; border-color: #d93025 !important; }
        
        #next-btn { margin-top: 25px; width: 100%; padding: 15px; background: #1a73e8; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; display: none; }
        .placeholder-text { text-align: center; color: #70757a; font-style: italic; }
    </style>
</head>
<body>

    <div class="container">
        <h1>AUZEF İSG Soru Bankası</h1>

        <div class="selection-area">
            <select id="sinif-select" onchange="updateDonemler()">
                <option value="">Sınıf Seçiniz</option>
                <option value="1. Sınıf">1. Sınıf</option>
                <option value="2. Sınıf">2. Sınıf</option>
                <option value="3. Sınıf">3. Sınıf</option>
                <option value="4. Sınıf">4. Sınıf</option>
            </select>
            <select id="donem-select" onchange="updateDersler()" disabled>
                <option value="">Dönem Seçiniz</option>
            </select>
            <select id="ders-select" onchange="startQuiz()" disabled>
                <option value="">Ders Seçiniz</option>
            </select>
        </div>

        <div class="stats">
            <div class="stat-box correct-box">Doğru: <span id="correct-count">0</span></div>
            <div class="stat-box wrong-box">Yanlış: <span id="wrong-count">0</span></div>
        </div>

        <div id="quiz-area">
            <p id="placeholder" class="placeholder-text">Lütfen çalışmak istediğiniz dersi seçin.</p>
            <div id="question" class="question-text"></div>
            <div id="options" class="options"></div>
            <button id="next-btn" onclick="loadNextQuestion()">Sonraki Soru</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://uvdilqnmdyfvntdcdfiv.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_m-58nv-vhIZVfdtZVtA8iQ_yEsMRacL';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const dersData = {
            "1. Sınıf": {
                "Güz": ["ATATÜRK İLKELERİ VE İNKILAP TARİHİ I", "HUKUKUN TEMEL KAVRAMLARI", "İLK YARDIM", "İŞ HİJYENİ", "TEMEL MATEMATİK", "TÜRK DİLİ I", "YABANCI DİL I"],
                "Bahar": ["ATATÜRK İLKELERİ VE İNKILAP TARİHİ II", "FİZYOLOJİ", "GENEL KİMYA", "İŞ HUKUKU", "İŞ SAĞLIĞI VE GÜVENLİĞİ", "TÜRK DİLİ II", "YABANCI DİL II"]
            },
            "2. Sınıf": {
                "Güz": ["ÇALIŞMA ALANLARINDA İŞ SAĞLIĞI VE GÜVENLİĞİ I", "İSTATİSTİK", "İŞ KAZALARI VE MESLEK HASTALIKLARI", "MAKİNE VE TEÇHİZAT I", "TEMEL BİYOLOJİ", "TEMEL FİZİK"],
                "Bahar": ["ÇALIŞMA ALANLARINDA İŞ SAĞLIĞI VE GÜVENLİĞİ II", "İŞ SAĞLIĞI VE GÜVENLİĞİ MEVZUATI - I", "İŞ SAĞLIĞI VE GÜVENLİĞİ YÖNETİM SİSTEMLERİ", "MAKİNE VE TEÇHİZAT II", "RİSK DEĞERLENDİRMESİ VE METODOLOJİSİ", "SOSYAL GÜVENLİK HUKUKU"]
            },
            "3. Sınıf": {
                "Güz": ["ACİL DURUM YÖNETİMİ", "İSTATİSTİK ANALİZ", "İŞ GÜVENLİĞİ EĞİTİM METODLARI", "İŞ SAĞLIĞI VE GÜVENLİĞİ MEVZUATI -II", "İŞLETME YÖNETİMİ", "YANGIN TEHLİKESİ VE YANGIN GÜVENLİĞİ"],
                "Bahar": ["ERGONOMİ", "HALK SAĞLIĞI", "LOJİSTİK İŞLERİNDE İŞ SAĞLIĞI VE GÜVENLİĞİ", "MADENLERDE İŞ SAĞLIĞI VE GÜVENLİĞİ", "TOPLAM KALİTE YÖNETİMİ", "YAPI İŞLERİNDE İŞ SAĞLIĞI VE GÜVENLİĞİ"]
            },
            "4. Sınıf": {
                "Güz": ["BAKIM VE ONARIMDA İŞ SAĞLIĞI VE GÜVENLİĞİ", "ÇALIŞMA ORTAMI GÖZETİMİ VE PERİYODİK KONTROLLER", "HAVALANDIRMA VE İKLİMLENDİRME", "İŞYERLERİNDE GÜRÜLTÜ VE KONTROLÜ", "RADYASYONLA ÇALIŞMALARDA İŞ SAĞLIĞI VE GÜVENLİĞİ", "UYARI İŞARETLERİ VE ETİKETLEME"],
                "Bahar": ["ÇALIŞMANIN SEYRİ VE SAĞLIK", "ELEKTİRİKLE ÇALIŞMALARDA İŞ SAĞLIĞI VE GÜVENLİĞİ", "İNSAN KAYNAKLARI YÖNETİMİ", "İŞ SAĞLIĞI VE GÜVENLİĞİ UYGULAMASI"]
            }
        };

        let currentQuestionId = null;
        let correctScore = parseInt(localStorage.getItem('isg_correct')) || 0;
        let wrongScore = parseInt(localStorage.getItem('isg_wrong')) || 0;

        function updateDonemler() {
            const sinif = document.getElementById('sinif-select').value;
            const donemSelect = document.getElementById('donem-select');
            donemSelect.innerHTML = '<option value="">Dönem Seçiniz</option>';
            document.getElementById('ders-select').innerHTML = '<option value="">Ders Seçiniz</option>';
            document.getElementById('ders-select').disabled = true;

            if (sinif) {
                Object.keys(dersData[sinif]).forEach(donem => {
                    donemSelect.innerHTML += `<option value="${donem}">${donem}</option>`;
                });
                donemSelect.disabled = false;
            } else {
                donemSelect.disabled = true;
            }
        }

        function updateDersler() {
            const sinif = document.getElementById('sinif-select').value;
            const donem = document.getElementById('donem-select').value;
            const dersSelect = document.getElementById('ders-select');
            dersSelect.innerHTML = '<option value="">Ders Seçiniz</option>';

            if (sinif && donem) {
                dersData[sinif][donem].forEach(ders => {
                    dersSelect.innerHTML += `<option value="${ders}">${ders}</option>`;
                });
                dersSelect.disabled = false;
            } else {
                dersSelect.disabled = true;
            }
        }

        function startQuiz() {
            const ders = document.getElementById('ders-select').value;
            if (ders) {
                document.getElementById('placeholder').style.display = 'none';
                document.getElementById('question').style.display = 'block';
                loadNextQuestion();
            }
        }

        async function loadNextQuestion() {
            const ders = document.getElementById('ders-select').value;
            const sinif = document.getElementById('sinif-select').value;
            
            document.getElementById('next-btn').style.display = 'none';
            document.getElementById('options').innerHTML = '';
            document.getElementById('question').innerText = 'Soru getiriliyor...';

            const { data, error } = await _supabase
                .from('questions')
                .select('*')
                .eq('ders_adi', ders)
                .limit(1);

            if (error || !data || data.length === 0) {
                document.getElementById('question').innerText = 'Bu derse ait henüz soru yüklenmemiş.';
                return;
            }

            const q = data[0];
            currentQuestionId = q.id;
            document.getElementById('question').innerText = q.soru_metni;

            const opts = [
                { key: 'A', text: q.secenek_a },
                { key: 'B', text: q.secenek_b },
                { key: 'C', text: q.secenek_c },
                { key: 'D', text: q.secenek_d },
                { key: 'E', text: q.secenek_e }
            ];

            opts.forEach(opt => {
                if(opt.text) {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.innerText = `${opt.key}) ${opt.text}`;
                    btn.onclick = () => checkAnswer(opt.key, btn);
                    document.getElementById('options').appendChild(btn);
                }
            });
        }

        async function checkAnswer(choice, btn) {
            const allBtns = document.querySelectorAll('.option-btn');
            allBtns.forEach(b => b.disabled = true);

            const { data: isCorrect } = await _supabase.rpc('check_answer', {
                p_question_id: currentQuestionId,
                p_answer: choice
            });

            if (isCorrect) {
                btn.classList.add('correct');
                correctScore++;
            } else {
                btn.classList.add('wrong');
                wrongScore++;
            }

            localStorage.setItem('isg_correct', correctScore);
            localStorage.setItem('isg_wrong', wrongScore);
            document.getElementById('correct-count').innerText = correctScore;
            document.getElementById('wrong-count').innerText = wrongScore;
            document.getElementById('next-btn').style.display = 'block';
        }

        document.getElementById('correct-count').innerText = correctScore;
        document.getElementById('wrong-count').innerText = wrongScore;
    </script>
</body>
</html>
