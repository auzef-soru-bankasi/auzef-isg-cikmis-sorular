<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUZEF İSG - Çıkmış Sorular</title>
    <!-- Modern Görünüm İçin CSS -->
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 600px; width: 100%; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; text-align: center; font-size: 24px; }
        .stats { display: flex; justify-content: space-between; margin-bottom: 20px; font-weight: bold; color: #34495e; background: #ecf0f1; padding: 10px; border-radius: 8px; }
        .question-box { margin-bottom: 20px; }
        .question-text { font-size: 18px; margin-bottom: 15px; line-height: 1.5; color: #333; }
        .options { display: flex; flex-direction: column; gap: 10px; }
        .option-btn { padding: 12px; border: 2px solid #ddd; border-radius: 8px; background: white; cursor: pointer; transition: 0.3s; text-align: left; font-size: 16px; }
        .option-btn:hover { border-color: #3498db; background-color: #f7fbfe; }
        .correct { background-color: #2ecc71 !important; color: white; border-color: #27ae60 !important; }
        .wrong { background-color: #e74c3c !important; color: white; border-color: #c0392b !important; }
        #next-btn { margin-top: 20px; width: 100%; padding: 15px; background: #3498db; color: white; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; display: none; }
        #next-btn:hover { background: #2980b9; }
    </style>
</head>
<body>

    <div class="container">
        <h1>AUZEF İSG Pratik</h1>
        
        <div class="stats">
            <span>Doğru: <span id="correct-count">0</span></span>
            <span>Yanlış: <span id="wrong-count">0</span></span>
        </div>

        <div id="quiz-area">
            <div class="question-box">
                <div id="question" class="question-text">Sorular yükleniyor, lütfen bekleyin...</div>
                <div id="options" class="options">
                    <!-- Şıklar buraya gelecek -->
                </div>
            </div>
            <button id="next-btn" onclick="loadNextQuestion()">Sonraki Soru</button>
        </div>
    </div>

    <!-- Supabase Bağlantısı ve Mantık -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Buradaki bilgileri birazdan Supabase'den alıp dolduracağız
        const SUPABASE_URL = 'SENIN_SUPABASE_URL_BURAYA';
        const SUPABASE_KEY = 'SENIN_SUPABASE_KEY_BURAYA';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let correctScore = localStorage.getItem('correctScore') || 0;
        let wrongScore = localStorage.getItem('wrongScore') || 0;
        document.getElementById('correct-count').innerText = correctScore;
        document.getElementById('wrong-count').innerText = wrongScore;

        async function loadNextQuestion() {
            // Soru çekme ve ekrana basma mantığı buraya gelecek
            document.getElementById('question').innerText = "Yakında sorularla dolacak!";
        }

        loadNextQuestion();
    </script>
</body>
</html>
