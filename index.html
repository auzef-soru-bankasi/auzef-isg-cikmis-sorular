<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>İSG Çıkmış Sorular</title>

<style>
body {font-family:'Segoe UI';display:flex;justify-content:center;padding:20px;background:#f5f5f5;}
.container {max-width:600px;width:100%;background:white;padding:25px;border-radius:12px;box-shadow:0 5px 20px rgba(0,0,0,0.1);}
select,button {padding:10px;margin-bottom:10px;width:100%;}
.option-btn {margin:5px 0;cursor:pointer;}
.correct {background:#2ecc71;color:white;}
.wrong {background:#e74c3c;color:white;}
#next {display:none;}
</style>
</head>

<body>

<div class="container">

<h2>İSG Çıkmış Sorular</h2>

<select id="ders"><option value="">Ders seç</option></select>
<select id="sinav"><option value="">Sınav seç</option></select>
<select id="test"><option value="">Test seç</option></select>

<div id="question"></div>
<div id="options"></div>
<button id="next" onclick="nextQuestion()">Sonraki</button>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const supabaseUrl = 'https://llwdimueymzxcetgdzpx.supabase.co';
const supabaseKey = 'sb_publishable_N6yruE8WmO_0wgZeessJxQ_PCwsKNFb';
const db = supabase.createClient(supabaseUrl, supabaseKey);

let questions = [];
let index = 0;

/* ========================= */
function shuffle(array) {
    return array.sort(() => Math.random() - 0.5);
}

/* ========================= */
async function loadDers() {
    let { data, error } = await db.from('sorular').select('ders_adi');

    if(error) return alert("DB hatası");

    let unique = [...new Set(data.map(x=>x.ders_adi))];

    let el = document.getElementById('ders');
    el.innerHTML = "<option value=''>Ders seç</option>";

    unique.forEach(d=>{
        el.innerHTML += `<option value="${d}">${d}</option>`;
    });
}

/* ========================= */
document.getElementById('ders').onchange = async function() {

    let ders = this.value;
    if(!ders) return;

    let { data } = await db
    .from('sorular')
    .select('sinav_turu')
    .eq('ders_adi', ders);

    let unique = [...new Set(data.map(x=>x.sinav_turu))];

    let el = document.getElementById('sinav');
    el.innerHTML = "<option value=''>Sınav seç</option>";

    unique.forEach(s=>{
        el.innerHTML += `<option value="${s}">${s}</option>`;
    });
};

/* ========================= */
document.getElementById('sinav').onchange = async function() {

    let ders = document.getElementById('ders').value;
    let sinav = this.value;
    if(!sinav) return;

    let { data } = await db
    .from('sorular')
    .select('test_no')
    .eq('ders_adi', ders)
    .eq('sinav_turu', sinav);

    let unique = [...new Set(data.map(x=>x.test_no))];

    let el = document.getElementById('test');
    el.innerHTML = "<option value=''>Test seç</option>";

    unique.forEach(t=>{
        el.innerHTML += `<option value="${t}">Test ${t}</option>`;
    });
};

/* ========================= */
document.getElementById('test').onchange = async function() {

    let ders = document.getElementById('ders').value;
    let sinav = document.getElementById('sinav').value;
    let test = this.value;
    if(!test) return;

    let { data, error } = await db
    .from('sorular')
    .select('*')
    .eq('ders_adi', ders)
    .eq('sinav_turu', sinav)
    .eq('test_no', test)
    .order('soru_no');

    if(error || !data || data.length === 0){
        alert("Soru yok");
        return;
    }

    questions = shuffle(data);
    index = 0;

    document.getElementById('next').style.display = "none";

    showQuestion();
};

/* ========================= */
function showQuestion(){

    let q = questions[index];
    if(!q) return;

    document.getElementById('question').innerHTML =
        `<b>Soru ${index+1}:</b><br>` +
        (q.soru_metni || "") +
        (q.gorsel_url ? `<br><img src="${q.gorsel_url}" width="100%">`:"");

    let opts = document.getElementById('options');
    opts.innerHTML = "";

    let secenekler = [
        {k:"A",v:q.secenek_a},
        {k:"B",v:q.secenek_b},
        {k:"C",v:q.secenek_c},
        {k:"D",v:q.secenek_d},
        {k:"E",v:q.secenek_e}
    ];

    shuffle(secenekler);

    secenekler.forEach(opt=>{
        if(!opt.v) return;

        let btn = document.createElement("button");
        btn.className = "option-btn";
        btn.innerText = opt.v;

        btn.onclick = ()=>{
            let all = document.querySelectorAll(".option-btn");
            all.forEach(b=>b.disabled=true);

            if(opt.k === q.dogru_cevap){
                btn.classList.add("correct");
            } else {
                btn.classList.add("wrong");

                all.forEach(b=>{
                    if(b.innerText === q["secenek_"+q.dogru_cevap.toLowerCase()]){
                        b.classList.add("correct");
                    }
                });
            }

            document.getElementById('next').style.display = "block";
        };

        opts.appendChild(btn);
    });
}

/* ========================= */
function nextQuestion(){
    index++;
    if(index < questions.length){
        showQuestion();
        document.getElementById('next').style.display = "none";
    } else {
        alert("Test bitti");
    }
}

loadDers();

</script>

</body>
</html>
