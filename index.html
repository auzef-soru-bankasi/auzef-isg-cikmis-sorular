<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUZEF İSG - Çıkmış Sorular</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 600px; width: 100%; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); }
        h1 { color: #1a73e8; text-align: center; font-size: 22px; margin-bottom: 10px; }
        .ders-bilgi { text-align: center; color: #5f6368; font-size: 14px; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .stats { display: flex; justify-content: space-around; margin-bottom: 20px; font-weight: bold; }
        .stat-box { padding: 10px 20px; border-radius: 8px; font-size: 14px; }
        .correct-box { background: #e6f4ea; color: #1e8e3e; }
        .wrong-box { background: #fce8e6; color: #d93025; }
        .question-text { font-size: 18px; margin-bottom: 20px; line-height: 1.6; color: #202124; font-weight: 500; }
        .options { display: flex; flex-direction: column; gap: 12px; }
        .option-btn { padding: 15px; border: 2px solid #dadce0; border-radius: 10px; background: white; cursor: pointer; transition: all 0.2s; text-align: left; font-size: 16px; color: #3c4043; }
        .option-btn:hover:not(:disabled) { border-color: #1a73e8; background-color: #f8f9fa; }
        .option-btn:disabled { cursor: not-allowed; }
        .correct { background-color: #34a853 !important; color: white !important; border-color: #188038 !important; }
        .wrong { background-color: #ea4335 !important; color: white !important; border-color: #d93025 !important; }
        #next-btn { margin-top: 25px; width: 100%; padding: 15px; background: #1a73e8; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; display: none; }
        #next-btn:hover { background: #1765cc; }
        .loading { text-align: center; color: #70757a; }
    </style>
</head>
<body>

    <div class="container">
        <h1>AUZEF İSG Lisans Soruları</h1>
        <div id="ders-adi" class="ders-bilgi">Veritabanına bağlanılıyor...</div>
        
        <div class="stats">
            <div class="stat-box correct-box">Doğru: <span id="correct-count">0</span></div>
            <div class="stat-box wrong-box">Yanlış: <span id="wrong-count">0</span></div>
        </div>

        <div id="quiz-area">
            <div id="question" class="question-text">Soru yükleniyor...</div>
            <div id="options" class="options"></div>
            <button id="next-btn" onclick="loadNextQuestion()">Sıradaki Soruya Geç</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Senin kopyaladığın özel bilgiler
        const SUPABASE_URL = 'https://uvdilqnmdyfvntdcdfiv.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_m-58nv-vhIZVfdtZVtA8iQ_yEsMRacL';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentQuestionId = null;
        let correctScore = parseInt(localStorage.getItem('isg_correct')) || 0;
        let wrongScore = parseInt(localStorage.getItem('isg_wrong')) || 0;

        document.getElementById('correct-count').innerText = correctScore;
        document.getElementById('wrong-count').innerText = wrongScore;

        async function loadNextQuestion() {
            document.getElementById('next-btn').style.display = 'none';
            document.getElementById('options').innerHTML = '';
            document.getElementById('question').innerText = 'Yeni soru getiriliyor...';
            
            // Rastgele bir soru çek (AUZEF müfredatından)
            const { data, error } = await _supabase
                .from('questions')
                .select('id, ders_adi, ders_kodu, soru_metni, secenek_a, secenek_b, secenek_c, secenek_d, secenek_e')
                .limit(1);

            if (error || !data || data.length === 0) {
                document.getElementById('question').innerText = 'Henüz soru eklenmemiş. Lütfen daha sonra tekrar kontrol edin.';
                document.getElementById('ders-adi').innerText = 'Soru Bankası Boş';
                return;
            }

            const q = data[0];
            currentQuestionId = q.id;
            document.getElementById('ders-adi').innerText = `${q.ders_kodu} - ${q.ders_adi}`;
            document.getElementById('question').innerText = q.soru_metni;

            const opts = [
                { key: 'A', text: q.secenek_a },
                { key: 'B', text: q.secenek_b },
                { key: 'C', text: q.secenek_c },
                { key: 'D', text: q.secenek_d },
                { key: 'E', text: q.secenek_e }
            ];

            opts.forEach(opt => {
                if(opt.text) {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.innerText = `${opt.key}) ${opt.text}`;
                    btn.onclick = () => checkAnswer(opt.key, btn);
                    document.getElementById('options').appendChild(btn);
                }
            });
        }

        async function checkAnswer(choice, btn) {
            const allBtns = document.querySelectorAll('.option-btn');
            allBtns.forEach(b => b.disabled = true);

            // F12 Koruması: Cevabı veritabanında (server-side) kontrol et
            const { data: isCorrect, error } = await _supabase.rpc('check_answer', {
                p_question_id: currentQuestionId,
                p_answer: choice
            });

            if (isCorrect) {
                btn.classList.add('correct');
                correctScore++;
                localStorage.setItem('isg_correct', correctScore);
            } else {
                btn.classList.add('wrong');
                wrongScore++;
                localStorage.setItem('isg_wrong', wrongScore);
                // Yanlış bilince doğruyu göstermiyoruz (F12 koruması gereği), kullanıcı tekrar denemeli!
            }

            document.getElementById('correct-count').innerText = correctScore;
            document.getElementById('wrong-count').innerText = wrongScore;
            document.getElementById('next-btn').style.display = 'block';
        }

        loadNextQuestion();
    </script>
</body>
</html>
